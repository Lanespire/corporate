[build]
  publish = "build"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--production=false"

# ---------- Cache headers ----------
[[headers]]
  for = "/_app/immutable/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.avif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "image/avif"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "image/webp"

[[headers]]
  for = "/ogp/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ---------- Subdomain consolidation (301) ----------
# lanespire.com/mvp* → mvp.lanespire.com (canonical)
[[redirects]]
  from = "/mvp"
  to = "https://mvp.lanespire.com/"
  status = 301
  force = true

[[redirects]]
  from = "/mvp/*"
  to = "https://mvp.lanespire.com/:splat"
  status = 301
  force = true

# lanespire.com/launch-lp* → launch-lp.lanespire.com (canonical)
[[redirects]]
  from = "/launch-lp"
  to = "https://launch-lp.lanespire.com/"
  status = 301
  force = true

[[redirects]]
  from = "/launch-lp/*"
  to = "https://launch-lp.lanespire.com/:splat"
  status = 301
  force = true

# ---------- Subdomain → internal route rewrite ----------
# Host-based rewriting is handled by netlify/edge-functions/host-rewrite.js.
# Netlify's `[[redirects]]` host condition was not honored for `/` rewrites
# (the static index.html resolved first regardless of force=true).
